<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f9fb" />
    <title>Offline - Pengumuman Pembagian Kelas</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --primary: #000a3d;
        --secondary: #075fab;
        --background: #f7f9fb;
        --text: #191c1e;
        --muted: #454651;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: var(--background);
        color: var(--text);
      }

      .card {
        width: min(100%, 28rem);
        padding: 1.75rem 1.5rem;
        border-radius: 1.25rem;
        background: #fff;
        border: 1px solid #e0e3e5;
        box-shadow: 0 12px 32px rgba(0, 10, 61, 0.08);
        text-align: center;
      }

      .logo {
        width: 4rem;
        height: 4rem;
        object-fit: contain;
        margin: 0 auto 1rem;
        display: block;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.375rem 0.75rem;
        border-radius: 9999px;
        background: #ffdad6;
        color: #ba1a1a;
        font-size: 0.75rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.375rem;
        color: var(--primary);
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.55;
        color: var(--muted);
        font-size: 0.9375rem;
      }

      button, a.btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.75rem 1.25rem;
        border: none;
        border-radius: 9999px;
        background: linear-gradient(135deg, var(--primary), #004077);
        color: #fff;
        font-size: 0.9375rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .tip {
        margin-top: 1rem;
        font-size: 0.8125rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/icon.png" alt="Logo sekolah" class="logo" />
      <div class="badge">Tanpa Internet</div>
      <h1>Kamu Sedang Offline</h1>
      <p>
        Koneksi internet tidak tersedia. Muat ulang halaman setelah sinyal kembali
        untuk membuka portal dan bermain game sambil menunggu.
      </p>
      <a class="btn" href="/">Muat Ulang Portal</a>
      <p class="tip">
        Buka portal sekali saat online agar mode offline otomatis aktif di perangkat ini.
      </p>
    </main>
  </body>
</html>
