name: Publish Docker images

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'docker-compose.swarm.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pembagian-kelas-api:latest
            ghcr.io/${{ github.repository_owner }}/pembagian-kelas-api:${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pembagian-kelas-web:latest
            ghcr.io/${{ github.repository_owner }}/pembagian-kelas-web:${{ github.sha }}