# Portainer SWARM / docker stack deploy
# Compose path: docker-compose.swarm.yml
# Image di-pull otomatis dari GitHub Container Registry (ghcr.io)
# Pastikan workflow "Publish Docker images" sudah sukses di tab Actions GitHub

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sman1sooko_kelas}
      POSTGRES_USER: ${POSTGRES_USER:-sman1sooko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kelas_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api:
    image: ghcr.io/ardianryan/pembagian-kelas-api:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sman1sooko}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sman1sooko_kelas}
      PORT: ${API_PORT:-3005}
      ANNOUNCEMENT_DATE: ${ANNOUNCEMENT_DATE:-2026-07-15T08:00:00+07:00}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5272}
      NODE_ENV: production
    volumes:
      - uploads_data:/app/apps/backend/uploads
    depends_on:
      - db
    networks:
      - kelas_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: ghcr.io/ardianryan/pembagian-kelas-web:latest
    environment:
      API_PORT: ${API_PORT:-3005}
    ports:
      - "${HTTP_PORT:-5272}:80"
    depends_on:
      - api
    networks:
      - kelas_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  postgres_data:
  uploads_data:

networks:
  kelas_net:
    driver: overlay