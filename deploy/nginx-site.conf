# Template Nginx untuk aaPanel / VPS
# Ganti DOMAIN_AND_PATH sesuai situs Anda.
#
# aaPanel: Website -> domain -> Config -> tambahkan blok location di bawah
# Root situs arahkan ke: /www/wwwroot/DOMAIN/apps/frontend/dist

server {
    listen 80;
    server_name DOMAIN;

    # aaPanel biasanya sudah set root; pastikan nilainya:
    root /www/wwwroot/DOMAIN/apps/frontend/dist;
    index index.html;

    # Upload max untuk logo & Excel impor admin
    client_max_body_size 20m;

    # API backend (PM2 di port 3005)
    location /api/ {
        proxy_pass http://127.0.0.1:3005/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Logo & file upload branding
    location /uploads/ {
        proxy_pass http://127.0.0.1:3005/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA (portal murid + /back-office admin)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache aset build Vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

# Setelah SSL aktif di aaPanel, redirect HTTP -> HTTPS otomatis ditangani panel.
# Pastikan proxy header X-Forwarded-Proto tetap ada untuk production.